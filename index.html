<!DOCTYPE html>
<html>
  <head>
    <title>20260406 수업</title>
  </head>
  <style>
    h1 {
      color: YELLOW;
    }

    .p_back {
      text-align: center;
      line-height: 30px;
      margin-top: 50px;
      background-color: red;
      color: white;
    }

    .p_back2 {
      font-size: 20px;
      font-weight: bold;
      color: blue;
    }

    ul li {
      float: left;
      width: 100px;
    }

    .id_title {
      width: 200px !important;
    }

    /* Tooltip container */
    .tooltip {
      position: relative;
      display: inline-block;
      border-bottom: 1px dotted black;
      cursor: pointer;
    }

    /* Tooltip text */
    .tooltiptext {
      visibility: hidden;
      width: 130px;
      background-color: black;
      color: #ffffff;
      text-align: center;
      padding: 5px 0;
      border-radius: 6px;
      position: absolute;
      z-index: 1;
      bottom: 125%;
      left: 50%;
      margin-left: -65px;
      box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
    }

    /* Show the tooltip text on hover */
    .tooltip:hover .tooltiptext {
      visibility: visible;
    }
  </style>

  <body>
    <h1>로그인</h1>

    <p class="p_back">
      로그인하려면 &nbsp;아이디 &nbsp;패스워드를 &nbsp;넣으세요.<br />
      <b><a href="https://www.syu.ac.kr" target="_blank">삼육대학교</a></b
      ><br />
      &lt; 두개의 값은 같다. &lt;삼육대학교&gt; &lt;/삼육대학교&gt; 태그를 사용해볼까?
    </p>

    <ul style="width: 350px; list-style-type: none">
      <li class="id_title" style="width: 150px !important">
        아이디
        <span class="tooltiptext">아이디는 학번을 입력하세요.</span>
      </li>
      <li class="tooltip" style="width: 150px !important">
        패스워드
        <span class="tooltiptext">패스워드는 대문자, 소문자, 특수문자, 숫자를 조합해서 입력하세요.</span>
      </li>
      <li style="width: 150px !important"><input type="text" name="userId" style="width: 130px" /></li>
      <li style="width: 150px !important"><input type="password" name="userPassword" style="width: 130px" /></li>
    </ul>

    <br />
    <p class="p_back2">&amp; 앰퍼샌트 ; 세미콜론 " 더블쿼트 : 콜론</p>
  </body>
</html>
